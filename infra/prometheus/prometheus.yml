global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    project:     clusterops

# ─── Scrape configs ───────────────────────────────────────────────────────────
scrape_configs:

  # ClusterOps API server (/metrics)
  - job_name: clusterops-api
    static_configs:
      - targets: [api:8080]
    metrics_path: /metrics

  # OpenTelemetry Collector (self-metrics forwarded to Prometheus exporter)
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
